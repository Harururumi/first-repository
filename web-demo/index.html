<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FF6B6B">
  <title>마법의 색칠나라</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #fff;
    }

    /* ── SCREEN SYSTEM ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      overflow: hidden;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── SPLASH ── */
    #splash {
      background: linear-gradient(135deg,#FF6B6B,#FFA07A,#FFD700,#98FB98,#87CEEB,#DDA0DD);
      background-size: 400% 400%;
      animation: gradShift 5s ease infinite;
      justify-content: center; align-items: center; gap: 28px;
    }
    @keyframes gradShift {
      0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
    }
    .splash-star {
      position: absolute; font-size: 28px;
      animation: starBob var(--d,3s) var(--dl,0s) ease-in-out infinite;
    }
    @keyframes starBob {
      0%,100%{transform:translateY(0) rotate(0deg);opacity:.6}
      50%{transform:translateY(-25px) rotate(180deg);opacity:1}
    }
    .splash-title { text-align: center; animation: popIn .8s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes popIn { from{transform:scale(.1);opacity:0} to{transform:scale(1);opacity:1} }
    .splash-title .t1 { display:block; font-size:38px; font-weight:900; color:#fff; text-shadow:2px 3px 8px rgba(0,0,0,.2); }
    .splash-title .t2 { display:block; font-size:54px; font-weight:900; color:#fff; text-shadow:2px 3px 8px rgba(0,0,0,.2); animation:bounceY 1.6s ease-in-out infinite; }
    @keyframes bounceY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .splash-title .sub { display:block; font-size:15px; color:rgba(255,255,255,.85); font-weight:600; margin-top:6px; }
    .splash-emojis { display:flex; gap:24px; font-size:50px; animation:fadeUp 1s .5s both; }
    .splash-emojis span { animation:floatEm 2s ease-in-out infinite; }
    .splash-emojis span:nth-child(2) { animation-delay:.3s; }
    .splash-emojis span:nth-child(3) { animation-delay:.6s; }
    @keyframes floatEm { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .splash-btn {
      padding:16px 48px; background:#fff; color:#FF6B6B;
      border:none; border-radius:60px; font-size:22px; font-weight:900;
      box-shadow:0 4px 20px rgba(0,0,0,.2); cursor:pointer;
      animation:fadeUp 1s .8s both, pulse 2s 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

    /* ── HOME ── */
    #home {
      background: linear-gradient(135deg,#E8D5FF,#C5E8FF);
      padding-top: calc(var(--safe-top) + 16px);
      padding-bottom: calc(var(--safe-bottom) + 8px);
    }
    .home-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:0 20px 14px;
    }
    .home-header h1 { font-size:22px; font-weight:900; color:#5B2D8E; }
    .home-header p  { font-size:12px; color:#5B2D8E; opacity:.7; }
    .my-works-btn {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      background:#FF6B9D; color:#fff; border:none; border-radius:18px;
      padding:10px 14px; font-size:11px; font-weight:800; cursor:pointer;
      min-width:60px; min-height:60px; justify-content:center;
      box-shadow:0 3px 12px rgba(255,107,157,.4);
    }
    .my-works-btn span:first-child { font-size:22px; }
    .char-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:14px;
      padding:0 14px; overflow-y:auto; flex:1; padding-bottom:12px;
    }
    .char-card {
      background:var(--cc); border-radius:22px; padding:12px;
      box-shadow:0 4px 14px rgba(0,0,0,.1); cursor:pointer;
      display:flex; flex-direction:column; align-items:center; gap:8px;
      position:relative; transition:transform .15s;
    }
    .char-card:active { transform:scale(.94); }
    .char-preview { width:100%; aspect-ratio:4/5; border-radius:12px; overflow:hidden; background:rgba(255,255,255,.6); }
    .char-preview svg { width:100%; height:100%; display:block; }
    .char-name-ko { font-size:16px; font-weight:900; color:#333; }
    .char-name-en { font-size:10px; color:#666; font-weight:600; }
    .char-stars    { font-size:13px; }
    .done-badge {
      position:absolute; top:9px; right:9px;
      background:#FF6B6B; color:#fff; font-size:10px; font-weight:900;
      padding:3px 8px; border-radius:20px;
    }

    /* ── COLORING ── */
    #coloring {
      background:#FFFEF5;
      padding-top: calc(var(--safe-top) + 0px);
      padding-bottom: calc(var(--safe-bottom) + 0px);
    }
    .col-topbar {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 14px 6px; flex-shrink:0;
    }
    .icon-btn {
      width:52px; height:52px; border:none; border-radius:50%; font-size:20px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.2); flex-shrink:0;
    }
    .btn-home  { background:#FF6B6B; }
    .btn-undo  { background:#9B59B6; }
    .btn-undo:disabled { background:#ccc; cursor:default; }
    .page-ttl  { display:flex; flex-direction:column; align-items:center; }
    .page-ttl-ko { font-size:17px; font-weight:900; color:#5B2D8E; }
    .page-ttl-en { font-size:11px; color:#888; font-weight:600; }

    .canvas-wrapper {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:0 10px; min-height:0;
    }
    .canvas-box {
      position:relative; background:#fff;
      border-radius:14px; box-shadow:0 4px 18px rgba(0,0,0,.15);
      overflow:hidden;
    }
    #coloring-svg { display:block; width:100%; height:100%; }
    #brush-canvas {
      position:absolute; top:0; left:0; width:100%; height:100%;
      touch-action:none;
    }

    .progress-row {
      display:flex; align-items:center; gap:8px;
      padding:4px 16px; flex-shrink:0;
    }
    .prog-label { font-size:11px; color:#999; font-weight:700; white-space:nowrap; }
    .prog-track { flex:1; height:10px; background:#eee; border-radius:6px; overflow:hidden; }
    .prog-fill  { height:100%; width:0%; border-radius:6px; transition:width .4s;
                  background:linear-gradient(to right,#FF6B6B,#FFD700); }
    .prog-pct   { font-size:12px; font-weight:800; color:#FF6B6B; width:36px; text-align:right; }

    .palette-row {
      display:flex; overflow-x:auto; gap:8px;
      padding:6px 10px; flex-shrink:0; scrollbar-width:none;
      background:rgba(255,255,255,.9); border-radius:14px; margin:0 8px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .palette-row::-webkit-scrollbar { display:none; }
    .swatch {
      width:42px; height:42px; border-radius:50%; flex-shrink:0; cursor:pointer;
      border:2px solid rgba(0,0,0,.1); transition:transform .15s;
      display:flex; align-items:center; justify-content:center;
    }
    .swatch:active { transform:scale(.88); }
    .swatch.sel {
      border:3px solid #fff; box-shadow:0 0 0 2.5px rgba(0,0,0,.3);
      transform:scale(1.18);
    }
    .swatch.sel::after { content:'✓'; color:#fff; font-size:15px; font-weight:900; text-shadow:0 1px 3px rgba(0,0,0,.5); }

    .toolbar {
      display:flex; align-items:center; gap:8px;
      padding:6px 14px calc(var(--safe-bottom) + 6px); flex-shrink:0;
    }
    .tool-btn {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      width:58px; padding:9px 0; border:none; border-radius:14px;
      background:rgba(0,0,0,.05); cursor:pointer; transition:all .15s;
    }
    .tool-btn .ti { font-size:22px; }
    .tool-btn .tl { font-size:10px; font-weight:800; color:#666; }
    .tool-btn.on  { background:var(--tc); box-shadow:0 2px 8px rgba(0,0,0,.2); }
    .tool-btn.on .tl { color:#fff; }
    .save-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
      padding:14px; background:#FF2D55; color:#fff; border:none; border-radius:50px;
      font-size:15px; font-weight:900; cursor:pointer;
      box-shadow:0 3px 12px rgba(255,45,85,.4);
    }

    /* ── GALLERY ── */
    #gallery {
      background:linear-gradient(135deg,#C5E8FF,#E8D5FF);
      padding-top: calc(var(--safe-top) + 16px);
      padding-bottom: calc(var(--safe-bottom) + 8px);
    }
    .gallery-header {
      display:flex; align-items:center; gap:12px; padding:0 18px 14px;
    }
    .back-btn {
      width:52px; height:52px; border:none; border-radius:50%;
      background:#FF6B6B; color:#fff; font-size:20px; cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,.2); flex-shrink:0;
    }
    .gallery-header h2 { font-size:24px; font-weight:900; color:#5B2D8E; }
    .gallery-header p  { font-size:12px; color:#5B2D8E; opacity:.7; }
    .art-grid {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;
      padding:0 12px; overflow-y:auto; flex:1; padding-bottom:12px;
    }
    .art-item {
      background:#fff; border-radius:14px; padding:8px;
      box-shadow:0 2px 8px rgba(0,0,0,.1); position:relative;
    }
    .art-item img { width:100%; aspect-ratio:4/5; border-radius:8px; object-fit:cover; display:block; }
    .art-name { font-size:10px; font-weight:800; color:#333; text-align:center; margin-top:4px; }
    .art-date { font-size:9px; color:#888; text-align:center; }
    .del-btn {
      position:absolute; top:-5px; right:-5px; width:22px; height:22px;
      background:#FF3B30; color:#fff; border:none; border-radius:50%;
      font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .empty-state {
      flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:14px; color:#5B2D8E;
    }
    .empty-state .ei { font-size:80px; }
    .empty-state h3  { font-size:20px; font-weight:900; }
    .empty-state p   { font-size:14px; opacity:.7; }

    /* ── CELEBRATION OVERLAY ── */
    #celebrate {
      position:fixed; inset:0; background:rgba(0,0,0,.5);
      display:none; flex-direction:column; align-items:center; justify-content:center;
      z-index:200;
    }
    #celebrate.show { display:flex; }
    .cel-card {
      background:linear-gradient(135deg,#7B2FF7,#F107A3);
      border-radius:28px; padding:32px 24px; margin:24px;
      text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.3);
      animation:popIn .5s cubic-bezier(.36,.07,.19,.97);
    }
    .cel-card .big { font-size:70px; display:block; margin-bottom:14px; }
    .cel-card h2   { font-size:42px; font-weight:900; color:#FFD700; text-shadow:0 0 20px rgba(255,215,0,.5); }
    .cel-card .cp  { font-size:17px; color:#fff; font-weight:700; margin:6px 0; }
    .cel-card .cs  { font-size:14px; color:rgba(255,255,255,.8); margin-bottom:22px; }
    .cel-btns { display:flex; flex-direction:column; gap:10px; }
    .cel-btns button { padding:13px 24px; border:none; border-radius:50px; font-size:15px; font-weight:900; cursor:pointer; }
    .btn-cont { background:#fff; color:#FF6B6B; }
    .btn-save { background:#34C759; color:#fff; }

    .confetti-p {
      position:fixed; top:-20px; pointer-events:none;
      animation:cFall var(--d) var(--dl) ease-in both;
    }
    @keyframes cFall {
      0%{transform:translateY(0) rotate(0deg);opacity:1}
      100%{transform:translateY(110vh) translateX(var(--dx)) rotate(720deg);opacity:0}
    }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:calc(var(--safe-bottom) + 90px); left:50%;
      transform:translateX(-50%) translateY(16px);
      background:#34C759; color:#fff; padding:11px 24px; border-radius:50px;
      font-size:14px; font-weight:800; box-shadow:0 4px 16px rgba(0,0,0,.2);
      opacity:0; transition:all .3s ease; z-index:300; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ═══════════ SPLASH ═══════════ -->
<div id="splash" class="screen active">
  <div class="splash-star" style="left:8%;top:12%;--d:3s;--dl:0s">⭐</div>
  <div class="splash-star" style="left:82%;top:18%;--d:2.5s;--dl:.4s">✨</div>
  <div class="splash-star" style="left:15%;top:78%;--d:3.5s;--dl:.2s">💫</div>
  <div class="splash-star" style="left:72%;top:72%;--d:2.8s;--dl:.7s">⭐</div>
  <div class="splash-star" style="left:50%;top:8%;--d:3.2s;--dl:.3s">✨</div>
  <div class="splash-star" style="left:4%;top:48%;--d:2.6s;--dl:1s">💫</div>
  <div class="splash-star" style="left:88%;top:52%;--d:3s;--dl:.6s">⭐</div>
  <div class="splash-title">
    <span class="t1">마법의</span>
    <span class="t2">색칠나라</span>
    <span class="sub">Magic Coloring Kingdom</span>
  </div>
  <div class="splash-emojis"><span>👑</span><span>🎨</span><span>✨</span></div>
  <button class="splash-btn" onclick="goHome()">시작하기! 🌟</button>
</div>

<!-- ═══════════ HOME ═══════════ -->
<div id="home" class="screen">
  <div class="home-header">
    <div>
      <h1>무엇을 색칠할까요?</h1>
      <p>What shall we color?</p>
    </div>
    <button class="my-works-btn" onclick="goGallery()">
      <span>💝</span><span>내 작품</span>
    </button>
  </div>
  <div class="char-grid" id="char-grid"></div>
</div>

<!-- ═══════════ COLORING ═══════════ -->
<div id="coloring" class="screen">
  <div class="col-topbar">
    <button class="icon-btn btn-home" onclick="goHome()">🏠</button>
    <div class="page-ttl">
      <span class="page-ttl-ko" id="ttl-ko">귀여운 공주</span>
      <span class="page-ttl-en" id="ttl-en">Sweet Princess</span>
    </div>
    <button class="icon-btn btn-undo" id="undo-btn" onclick="undo()" disabled>↩️</button>
  </div>

  <div class="canvas-wrapper" id="canvas-wrapper">
    <div class="canvas-box" id="canvas-box">
      <svg id="col-svg" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
        <g id="fill-layer"></g>
        <g id="outline-layer" style="pointer-events:none"></g>
      </svg>
      <canvas id="brush-canvas"></canvas>
    </div>
  </div>

  <div class="progress-row">
    <span class="prog-label">색칠 완성도</span>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <span class="prog-pct" id="prog-pct">0%</span>
  </div>

  <div class="palette-row" id="palette"></div>

  <div class="toolbar">
    <button class="tool-btn on" id="btn-bucket" style="--tc:#34C759" onclick="setTool('bucket')">
      <span class="ti">🪣</span><span class="tl">채우기</span>
    </button>
    <button class="tool-btn" id="btn-brush" style="--tc:#007AFF" onclick="setTool('brush')">
      <span class="ti">🖌️</span><span class="tl">붓</span>
    </button>
    <button class="tool-btn" id="btn-eraser" style="--tc:#8E8E93" onclick="setTool('eraser')">
      <span class="ti">🧹</span><span class="tl">지우개</span>
    </button>
    <button class="save-btn" onclick="saveArtwork()">💾 저장하기</button>
  </div>
</div>

<!-- ═══════════ GALLERY ═══════════ -->
<div id="gallery" class="screen">
  <div class="gallery-header">
    <button class="back-btn" onclick="goHome()">◀</button>
    <div>
      <h2>내 작품 💝</h2>
      <p>My Creations</p>
    </div>
  </div>
  <div id="gallery-body" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;"></div>
</div>

<!-- ═══════════ CELEBRATION ═══════════ -->
<div id="celebrate">
  <div class="cel-card">
    <span class="big">🎉</span>
    <h2>훌륭해요!</h2>
    <p class="cp">Wonderful job!</p>
    <p class="cs">그림을 완성했어요! ⭐</p>
    <div class="cel-btns">
      <button class="btn-cont" onclick="hideCelebrate()">계속 색칠하기</button>
      <button class="btn-save" onclick="saveAndExit()">저장하고 나가기 💾</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const PALETTE = [
  '#FF3B30','#FF9500','#FFCC00','#34C759',
  '#007AFF','#AF52DE','#FF2D55','#FF6B9D',
  '#5AC8FA','#4CD964','#8B4513','#FFDAB9',
  '#FFFFFF','#AAAAAA','#555555','#000000'
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let curScreen = 'splash';
let curChar   = null;
let color     = '#FF3B30';
let tool      = 'bucket';
let rColors   = {};        // {regionId: cssColor}
let strokes   = [];        // [{color,lw,pts,erase}]
let undos     = [];        // [{t:'r',id,prev}|{t:'s',i}]
let artworks  = JSON.parse(localStorage.getItem('cwArtworks')||'[]');
let celebrated = false;

let svg, fillL, outlineL, brushCanvas, bCtx, canvasBox;

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  curScreen = id;
}
function goHome()    { buildHome(); show('home'); }
function goGallery() { buildGallery(); show('gallery'); }
function goColoring(char) {
  curChar = char; rColors = {}; strokes = []; undos = []; celebrated = false;
  document.getElementById('ttl-ko').textContent = char.nameKo;
  document.getElementById('ttl-en').textContent = char.nameEn;
  buildSVG(char);
  show('coloring');
  requestAnimationFrame(()=>{ resizeCanvas(); redraw(); updateProg(); syncUndoBtn(); setTool('bucket'); });
}

// ══════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════
function buildHome() {
  const g = document.getElementById('char-grid');
  g.innerHTML = '';
  CHARS.forEach(char => {
    const done = artworks.some(a=>a.cid===char.id);
    const stars = '⭐'.repeat(char.difficulty)+'☆'.repeat(3-char.difficulty);
    const card = document.createElement('div');
    card.className = 'char-card';
    card.style.setProperty('--cc', char.cc);
    card.innerHTML = `
      ${done ? '<div class="done-badge">완성! ⭐</div>' : ''}
      <div class="char-preview">${previewSVG(char)}</div>
      <div class="char-name-ko">${char.nameKo}</div>
      <div class="char-name-en">${char.nameEn}</div>
      <div class="char-stars">${stars}</div>`;
    card.onclick = ()=>{ buzz(); goColoring(char); };
    g.appendChild(card);
  });
}

function previewSVG(char) {
  const paths = [...char.regions].sort((a,b)=>a.z-b.z).map(r=>{
    const f = char.prev[r.id]||'#f8f8f8';
    return `<path d="${r.d}" fill="${f}" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>`;
  }).join('');
  return `<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
}

// ══════════════════════════════════════════════
// COLORING SVG
// ══════════════════════════════════════════════
function buildSVG(char) {
  svg        = document.getElementById('col-svg');
  fillL      = document.getElementById('fill-layer');
  outlineL   = document.getElementById('outline-layer');
  brushCanvas= document.getElementById('brush-canvas');
  bCtx       = brushCanvas.getContext('2d');
  canvasBox  = document.getElementById('canvas-box');

  fillL.innerHTML = ''; outlineL.innerHTML = '';

  [...char.regions].sort((a,b)=>a.z-b.z).forEach(r=>{
    // fill path
    const fp = document.createElementNS('http://www.w3.org/2000/svg','path');
    fp.setAttribute('d', r.d);
    fp.setAttribute('fill', rColors[r.id]||'white');
    fp.setAttribute('id', 'f-'+r.id);
    fp.style.cursor = 'pointer';
    fp.addEventListener('click', ()=>{ if(tool==='bucket') doFill(r.id); });
    fillL.appendChild(fp);

    // outline path
    const op = document.createElementNS('http://www.w3.org/2000/svg','path');
    op.setAttribute('d', r.d);
    op.setAttribute('fill','none');
    op.setAttribute('stroke','#1a1a1a');
    op.setAttribute('stroke-width','2.5');
    op.setAttribute('stroke-linejoin','round');
    op.setAttribute('stroke-linecap','round');
    outlineL.appendChild(op);
  });

  buildPalette();
  initBrush();
}

function doFill(id) {
  const prev = rColors[id]||null;
  rColors[id] = color;
  const el = document.getElementById('f-'+id);
  if(el) el.setAttribute('fill', color);
  undos.push({t:'r',id,prev}); syncUndoBtn(); buzz(); updateProg();
}

// ══════════════════════════════════════════════
// BRUSH CANVAS
// ══════════════════════════════════════════════
function initBrush() {
  brushCanvas.removeEventListener('touchstart', onTS);
  brushCanvas.removeEventListener('touchmove',  onTM);
  brushCanvas.removeEventListener('touchend',   onTE);
  brushCanvas.removeEventListener('mousedown',  onMD);
  brushCanvas.removeEventListener('mousemove',  onMM);
  brushCanvas.removeEventListener('mouseup',    onMU);
  brushCanvas.addEventListener('touchstart', onTS, {passive:false});
  brushCanvas.addEventListener('touchmove',  onTM, {passive:false});
  brushCanvas.addEventListener('touchend',   onTE, {passive:false});
  brushCanvas.addEventListener('mousedown',  onMD);
  brushCanvas.addEventListener('mousemove',  onMM);
  brushCanvas.addEventListener('mouseup',    onMU);
}

let drawing = false, curPts = [];

function pt(e) {
  const r = brushCanvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x:(t.clientX-r.left)*(brushCanvas.width/r.width),
           y:(t.clientY-r.top)*(brushCanvas.height/r.height) };
}
function onTS(e){ e.preventDefault(); if(tool==='bucket')return; drawing=true; curPts=[pt(e)]; }
function onTM(e){ e.preventDefault(); if(!drawing||tool==='bucket')return; curPts.push(pt(e)); drawLast(); }
function onTE(e){ e.preventDefault(); endStroke(); }
function onMD(e){ if(tool==='bucket')return; drawing=true; curPts=[pt(e)]; }
function onMM(e){ if(!drawing||tool==='bucket')return; curPts.push(pt(e)); drawLast(); }
function onMU(){ endStroke(); }

function drawLast() {
  if(curPts.length<2) return;
  bCtx.save();
  applyBrushStyle();
  bCtx.beginPath();
  const a=curPts[curPts.length-2], b=curPts[curPts.length-1];
  bCtx.moveTo(a.x,a.y); bCtx.lineTo(b.x,b.y); bCtx.stroke();
  bCtx.restore();
}

function applyBrushStyle(ctx) {
  const c = ctx||bCtx;
  if(tool==='eraser'){ c.globalCompositeOperation='destination-out'; c.strokeStyle='rgba(0,0,0,1)'; c.lineWidth=40; }
  else { c.globalCompositeOperation='source-over'; c.strokeStyle=color; c.lineWidth=20; }
  c.lineCap='round'; c.lineJoin='round';
}

function endStroke() {
  if(!drawing) return; drawing=false;
  if(curPts.length<2){ curPts=[]; return; }
  const s={color,lw:tool==='eraser'?40:20,pts:[...curPts],erase:tool==='eraser'};
  strokes.push(s);
  undos.push({t:'s',i:strokes.length-1});
  syncUndoBtn(); curPts=[];
}

function redraw() {
  if(!bCtx) return;
  bCtx.clearRect(0,0,brushCanvas.width,brushCanvas.height);
  strokes.forEach(s=>{
    if(s.pts.length<2) return;
    bCtx.save();
    if(s.erase){ bCtx.globalCompositeOperation='destination-out'; bCtx.strokeStyle='rgba(0,0,0,1)'; }
    else { bCtx.globalCompositeOperation='source-over'; bCtx.strokeStyle=s.color; }
    bCtx.lineWidth=s.lw; bCtx.lineCap='round'; bCtx.lineJoin='round';
    bCtx.beginPath(); bCtx.moveTo(s.pts[0].x,s.pts[0].y);
    s.pts.forEach(p=>bCtx.lineTo(p.x,p.y)); bCtx.stroke(); bCtx.restore();
  });
}

// ══════════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════════
function resizeCanvas() {
  const w0 = document.getElementById('canvas-wrapper');
  const aw = w0.clientWidth-20, ah = w0.clientHeight;
  const ar = 4/5;
  let w,h;
  if(aw/ah > ar){ h=ah; w=h*ar; } else { w=aw; h=w/ar; }
  canvasBox.style.width=w+'px'; canvasBox.style.height=h+'px';
  brushCanvas.width=w; brushCanvas.height=h;
  redraw();
}
window.addEventListener('resize',()=>{ if(curScreen==='coloring') resizeCanvas(); });

// ══════════════════════════════════════════════
// TOOL & PALETTE
// ══════════════════════════════════════════════
function setTool(t) {
  tool = t;
  ['bucket','brush','eraser'].forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('on', x===t);
  });
  if(t==='bucket'){ brushCanvas.style.pointerEvents='none'; svg.style.pointerEvents='all'; }
  else { brushCanvas.style.pointerEvents='all'; svg.style.pointerEvents='none'; }
}

function buildPalette() {
  const p = document.getElementById('palette'); p.innerHTML='';
  PALETTE.forEach(c=>{
    const s=document.createElement('div');
    s.className='swatch'+(c===color?' sel':'');
    s.style.background=c;
    if(c==='#FFFFFF') s.style.border='2px solid #ccc';
    s.onclick=()=>{
      color=c;
      document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));
      s.classList.add('sel');
      if(tool==='eraser') setTool('brush');
      buzz();
    };
    p.appendChild(s);
  });
}

// ══════════════════════════════════════════════
// UNDO
// ══════════════════════════════════════════════
function undo() {
  if(!undos.length) return;
  const a = undos.pop();
  if(a.t==='r'){
    const el=document.getElementById('f-'+a.id);
    if(a.prev===null){ delete rColors[a.id]; if(el) el.setAttribute('fill','white'); }
    else { rColors[a.id]=a.prev; if(el) el.setAttribute('fill',a.prev); }
    updateProg();
  } else {
    strokes.splice(a.i,1); redraw();
  }
  syncUndoBtn();
}
function syncUndoBtn(){
  document.getElementById('undo-btn').disabled = undos.length===0;
}

// ══════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════
function updateProg() {
  if(!curChar) return;
  const nonBg = curChar.regions.filter(r=>r.id!=='bg'&&r.id!=='ground');
  const done  = nonBg.filter(r=>rColors[r.id]).length;
  const pct   = nonBg.length ? done/nonBg.length : 0;
  document.getElementById('prog-fill').style.width = (pct*100)+'%';
  document.getElementById('prog-pct').textContent  = Math.round(pct*100)+'%';
  if(pct>=0.8 && !celebrated){ celebrated=true; setTimeout(showCelebrate,500); }
}

// ══════════════════════════════════════════════
// CELEBRATION
// ══════════════════════════════════════════════
function showCelebrate() {
  spawnConfetti();
  document.getElementById('celebrate').classList.add('show');
}
function hideCelebrate() { document.getElementById('celebrate').classList.remove('show'); }
function saveAndExit()   { saveArtwork(); hideCelebrate(); goHome(); }

function spawnConfetti() {
  const cols=['#FF6B6B','#FFD700','#34C759','#007AFF','#AF52DE','#FF2D55','#FF9500'];
  for(let i=0;i<55;i++){
    const d=document.createElement('div');
    d.className='confetti-p';
    d.style.setProperty('--d',(Math.random()*1.5+1.5)+'s');
    d.style.setProperty('--dl',(Math.random()*1.2)+'s');
    d.style.setProperty('--dx',(Math.random()*200-100)+'px');
    d.style.left=Math.random()*100+'vw';
    d.style.background=cols[i%cols.length];
    d.style.borderRadius=Math.random()>.5?'50%':'3px';
    d.style.width=(Math.random()*10+5)+'px';
    d.style.height=d.style.width;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), 4000);
  }
}

// ══════════════════════════════════════════════
// SAVE
// ══════════════════════════════════════════════
function saveArtwork() {
  if(!curChar) return;
  const svgEl   = document.getElementById('col-svg');
  const svgStr  = new XMLSerializer().serializeToString(svgEl);
  const dataUri = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);

  const comp = document.createElement('canvas');
  comp.width=400; comp.height=500;
  const ctx = comp.getContext('2d');

  const img = new Image();
  img.onload = () => {
    ctx.fillStyle='white'; ctx.fillRect(0,0,400,500);
    ctx.drawImage(img,0,0,400,500);
    // overlay brush strokes
    const b2 = new Image();
    b2.onload = ()=>{
      ctx.drawImage(b2,0,0,400,500);
      persist(comp.toDataURL('image/png'));
    };
    b2.onerror = ()=>persist(comp.toDataURL('image/png'));
    b2.src = brushCanvas.toDataURL();
  };
  img.onerror = ()=>persist(dataUri);
  img.src = dataUri;
}

function persist(dataUrl) {
  const aw={id:Date.now(), cid:curChar.id, nameKo:curChar.nameKo, dataUrl,
             date:new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric'})};
  artworks.unshift(aw);
  if(artworks.length>60) artworks.pop();
  try{ localStorage.setItem('cwArtworks',JSON.stringify(artworks)); }catch(e){}
  toast('저장되었어요! 💾');
}

// ══════════════════════════════════════════════
// GALLERY
// ══════════════════════════════════════════════
function buildGallery() {
  const body = document.getElementById('gallery-body');
  body.innerHTML = '';
  if(!artworks.length){
    body.innerHTML=`<div class="empty-state"><div class="ei">🎨</div><h3>아직 작품이 없어요!</h3><p>색칠하고 저장해보세요!</p></div>`;
    return;
  }
  const g=document.createElement('div'); g.className='art-grid';
  artworks.forEach(a=>{
    const item=document.createElement('div'); item.className='art-item';
    item.innerHTML=`
      <button class="del-btn" onclick="delArt(${a.id},event)">×</button>
      <img src="${a.dataUrl}" alt="${a.nameKo}" loading="lazy">
      <div class="art-name">${a.nameKo}</div>
      <div class="art-date">${a.date}</div>`;
    g.appendChild(item);
  });
  body.appendChild(g);
}
function delArt(id,e){
  e.stopPropagation();
  if(confirm('이 작품을 삭제할까요?')){
    artworks=artworks.filter(a=>a.id!==id);
    try{ localStorage.setItem('cwArtworks',JSON.stringify(artworks)); }catch(e){}
    buildGallery();
  }
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function buzz(){ if('vibrate' in navigator) navigator.vibrate(10); }

// ── init ──
buildHome();
setTimeout(()=>{ if(curScreen==='splash') goHome(); }, 4000);
</script>
